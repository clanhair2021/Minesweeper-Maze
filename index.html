<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マインスイーパー×迷路</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f3; padding: 10px; margin: 0; user-select: none; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 5px; }
        .info { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 320px;
            margin: 0 auto 20px auto;
            background: #bbb;
            padding: 6px;
            border-radius: 8px;
        }
        
        .cell {
            aspect-ratio: 1;
            background: #cbd5e1;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #334155;
            box-shadow: inset 0 -3px 0 #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:active { background: #94a3b8; }
        
        .cell.open {
            background: #f1f5f9;
            box-shadow: none;
            color: #1e293b;
        }
        .cell.mine { background: #ef4444; color: white; }
        .cell.goal { background: #10b981; color: white; }

        #result-text { font-size: 1.3rem; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .game-over { color: #ef4444; }
        .game-clear { color: #10b981; }

        button.reset-btn {
            padding: 12px 24px; font-size: 1rem; background: #4f46e5;
            color: white; border: none; border-radius: 6px; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>マインスイーパー × 迷路</h1>
    <div class="info">どこかをタップして開始！隠れたG(ゴール)を見つけ出せ！</div>
    
    <div id="game-board"></div>
    
    <div id="result-text"></div>
    <button class="reset-btn" onclick="restartGame()">新しくやり直す</button>

    <script>
        const width = 5;
        const height = 5;
        const mineCount = 4;
        let grid = [];
        let revealed = [];
        let gameOver = false;
        let isFirstClick = true;

        function restartGame() {
            gameOver = false;
            isFirstClick = true;
            document.getElementById('result-text').className = "";
            document.getElementById('result-text').innerText = "最初のマスをタップしてください";
            
            initGrid();
            createBoardUI();
        }

        function initGrid() {
            grid = [];
            revealed = [];
            for (let x = 0; x < width; x++) {
                grid.push(new Array(height).fill(0));
                revealed.push(new Array(height).fill(false));
            }
        }

        function generatePathFromStart(firstX, firstY) {
            let sx = firstX;
            let sy = firstY;
            
            let gx, gy;
            do {
                gx = Math.floor(Math.random() * width);
                gy = Math.floor(Math.random() * height);
            } while (
                sx === gx && sy === gy || 
                Math.abs(sx - gx) + Math.abs(sy - gy) < 3
            );

            let cx = sx;
            let cy = sy;
            grid[cx][cy] = "S";

            let safetyCounter = 0;
            while ((cx !== gx || cy !== gy) && safetyCounter < 100) {
                safetyCounter++;
                let candidates = [];
                const dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
                
                for (let d of dirs) {
                    let nx = cx + d.x, ny = cy + d.y;
                    if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                        candidates.push({x: nx, y: ny});
                    }
                }

                candidates.sort((a, b) => {
                    const distA = Math.abs(a.x - gx) + Math.abs(a.y - gy);
                    const distB = Math.abs(b.x - gx) + Math.abs(b.y - gy);
                    return distA - distB;
                });

                let nextCell;
                if (Math.random() < 0.6) {
                    nextCell = candidates[0];
                } else {
                    nextCell = candidates[Math.floor(Math.random() * candidates.length)];
                }

                cx = nextCell.x;
                cy = nextCell.y;

                if (grid[cx][cy] === 0) {
                    grid[cx][cy] = "P";
                }
            }
            grid[gx][gy] = "G";
        }

        function placeMines() {
            let placed = 0;
            while (placed < mineCount) {
                const rx = Math.floor(Math.random() * width);
                const ry = Math.floor(Math.random() * height);
                if (grid[rx][ry] === 0) {
                    grid[rx][ry] = 9;
                    placed++;
                }
            }
        }

        function countAdjacentMines() {
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    if (grid[x][y] === 9) continue;
                    let count = 0;
                    for (let dx of [-1, 0, 1]) {
                        for (let dy of [-1, 0, 1]) {
                            const nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                if (grid[nx][ny] === 9) count++;
                            }
                        }
                    }
                    if (grid[x][y] === 0 || grid[x][y] === "P" || grid[x][y] === "S" || grid[x][y] === "G") {
                        const type = grid[x][y];
                        grid[x][y] = { type: type, count: count };
                    }
                }
            }
        }

        function createBoardUI() {
            const board = document.getElementById('game-board');
            board.innerHTML = "";
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const cellBtn = document.createElement('div');
                    cellBtn.className = 'cell';
                    cellBtn.innerText = "❓";
                    cellBtn.onclick = () => handleCellClick(x, y, cellBtn);
                    board.appendChild(cellBtn);
                }
            }
        }

        function handleCellClick(x, y, element) {
            if (gameOver || revealed[x][y]) return;

            if (isFirstClick) {
                isFirstClick = false;
                generateRandomMap(x, y);
            }

            revealCell(x, y, element);
        }

        function generateRandomMap(startX, startY) {
            generatePathFromStart(startX, startY);
            placeMines();
            countAdjacentMines();
        }

        function revealCell(x, y, element) {
            revealed[x][y] = true;
            element.classList.add('open');
            
            const data = grid[x][y];
            
            // 🛠️ 【改造】Sだった場合も、普通の安全なマスとして数字か空白を表示する
            if (data.type === "S") {
                element.innerText = data.count > 0 ? data.count : "";
                document.getElementById('result-text').innerText = "探索中... ゴール(G)を探せ！";
            }
            else if (data.type === "G") {
                element.innerText = "G";
                element.className = 'cell open goal';
                document.getElementById('result-text').innerText = "🎉 迷路クリア！おめでとう！";
                document.getElementById('result-text').className = "game-clear";
                gameOver = true;
                revealAll();
            }
            else if (data === 9) {
                element.innerText = "💥";
                element.className = 'cell open mine';
                document.getElementById('result-text').innerText = "💀 地雷爆発！ゲームオーバー";
                document.getElementById('result-text').className = "game-over";
                gameOver = true;
                revealAll();
            }
            else {
                element.innerText = data.count > 0 ? data.count : "";
                if (data.type === "P") {
                    element.style.color = "#4f46e5";
                }
            }
        }

        function revealAll() {
            const cells = document.getElementsByClassName('cell');
            let idx = 0;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const data = grid[x][y];
                    const cell = cells[idx];
                    if (!revealed[x][y]) {
                        cell.classList.add('open');
                        // 答え合わせ時もSは数字として表示
                        if (data.type === "S") { cell.innerText = data.count > 0 ? data.count : ""; }
                        else if (data.type === "G") { cell.innerText = "G"; cell.classList.add('goal'); }
                        else if (data === 9) { cell.innerText = "💣"; cell.classList.add('mine'); }
                        else cell.innerText = data.count > 0 ? data.count : "";
                    }
                    idx++;
                }
            }
        }

        restartGame();
    </script>
</body>
</html>
