<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マインスイーパー×迷路 開発室</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; margin: 0; }
        h1 { font-size: 1.2rem; color: #333; }
        #log-window {
            background: #222; color: #0f0; font-family: monospace;
            padding: 15px; border-radius: 5px; max-width: 400px;
            margin: 20px auto; text-align: left; white-space: pre;
            overflow-x: auto; font-size: 1.1rem; line-height: 1.4;
        }
        button {
            padding: 10px 20px; font-size: 1rem; background: #007bff;
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        button:active { background: #0056b3; }
        .info { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>マインスイーパー×迷路 (迷路ルート生成テスト)</h1>
    <div class="info">※「S」がスタート、「G」がゴール、「P」が安全な道、「9」が地雷です</div>
    <button onclick="restartGame()">迷路と地雷を再生成</button>
    
    <div id="log-window"></div>

    <script>
        const width = 5;
        const height = 5;
        const mineCount = 4; // 道を確保するため地雷を4個に少し減らします
        let grid = [];

        function restartGame() {
            document.getElementById('log-window').innerHTML = "生成中...\n";
            initGrid();
            generatePath(); // 👈 先に安全な「一本道」を作る
            placeMines();   // 👈 道を避けて地雷を置く
            countAdjacentMines();
            printGridTest();
        }

        function initGrid() {
            grid = [];
            for (let x = 0; x < width; x++) {
                let column = [];
                for (let y = 0; y < height; y++) {
                    column.push(0);
                }
                grid.push(column);
            }
        }

        // 🛠️ 【新機能】スタートからゴールまでのランダムな一本道を作る
        // (簡易的なランダムウォークアルゴリズム)
        function generatePath() {
            let cx = 0; // スタートは左上 (0,0)
            let cy = 0;
            grid[cx][cy] = "S"; // S = Start

            // ゴール (右下) にたどり着くまで右か下に進む
            while (cx < width - 1 || cy < height - 1) {
                // 右に進むか、下に進むかをランダムで決める
                if (cx < width - 1 && cy < height - 1) {
                    if (Math.random() < 0.5) cx++; else cy++;
                } else if (cx < width - 1) {
                    cx++; // 右端にいくまで右
                } else {
                    cy++; // 下端にいくまで下
                }

                // ゴール地点なら「G」、途中なら「P（Path=道）」とする
                if (cx === width - 1 && cy === height - 1) {
                    grid[cx][cy] = "G"; // G = Goal
                } else {
                    grid[cx][cy] = "P"; // P = 安全な道
                }
            }
        }

        // 🛠️ 【改造】すでに「道(S, G, P)」がある場所を避けて地雷を置く
        function placeMines() {
            let placed = 0;
            while (placed < mineCount) {
                const rx = Math.floor(Math.random() * width);
                const ry = Math.floor(Math.random() * height);
                
                // 0（まだ何も置かれていない空きマス）の場所にだけ地雷を置く
                if (grid[rx][ry] === 0) {
                    grid[rx][ry] = 9;
                    placed++;
                }
            }
        }

        function countAdjacentMines() {
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    // 自分自身が地雷(9)か、スタート(S)・ゴール(G)・道(P)なら数字計算をスキップ
                    if (grid[x][y] === 9) continue;
                    
                    let count = 0;
                    for (let dx of [-1, 0, 1]) {
                        for (let dy of [-1, 0, 1]) {
                            const nx = x + dx;
                            const ny = y + dy;
                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                if (grid[nx][ny] === 9) count++;
                            }
                        }
                    }
                    
                    // 空きマス（0）だった場所には、周りの地雷の数をそのまま入れる
                    if (grid[x][y] === 0) {
                        grid[x][y] = count;
                    }
                    // 道（P）だった場所は、分かりやすいように後で「文字と数字」を組み合わせるため、
                    // ここでは一旦そのままにしておきます（次のステップで、ゲームとして遊べるようにします）
                }
            }
        }

        function printGridTest() {
            let output = "--- 迷路マップ ---\n";
            for (let y = 0; y < height; y++) {
                let line = "";
                for (let x = 0; x < width; x++) {
                    line += grid[x][y] + " ";
                }
                output += line + "\n";
            }
            document.getElementById('log-window').innerHTML = output;
        }

        restartGame();
    </script>
</body>
</html>
