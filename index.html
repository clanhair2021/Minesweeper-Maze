<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>極・マインスイーパー×迷路 - タイムサバイバル</title>
    <!-- 外部CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>極・マインスイーパー × 迷路</h1>
    
    <div class="game-status-header">
        <span class="level-badge" id="level-display">Level 1</span>
        <span class="score-badge" id="score-display">Score: 0</span>
    </div>

    <div class="action-select">
        <button id="tool-dig" class="action-btn active" onclick="setClickMode('dig')">⛏️ 開ける</button>
        <button id="tool-flag" class="action-btn" onclick="setClickMode('flag')">🚩 旗を置く</button>
    </div>
    
    <div class="stats-container">
        <div class="stats-row">
            <div>🚩: <span id="mine-counter">0</span></div>
            <div>⏱️ 目標時間: <span id="timer">0.0</span>秒</div>
        </div>
        <div class="time-bar-container">
            <div id="time-bar" class="time-bar-fill"></div>
        </div>
    </div>
    <div id="best-score" class="best-score">最高到達階層: --</div>
    
    <div class="board-wrapper"><div id="game-board"></div></div>
    
    <div id="result-text"></div>
    
    <button id="next-stage-btn" class="next-btn" onclick="showConfirmDialog()">次の階層へ進む ➔</button>
    
    <div>
        <button class="reset-btn" onclick="resetToLevel1()">最初からやり直す</button>
    </div>

    <!-- 移動確認用カスタムモーダル（ポップアップ） -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">次の階層へ進みますか？</div>
            <div class="modal-body">
                まだ盤面に安全なマスが残っています！<br>
                全消し（パーフェクト）を狙う場合は、キャンセルして探索を続けられます。
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeConfirmDialog()">探索を続ける</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmMoveStage()">移動する</button>
            </div>
        </div>
    </div>

    <!-- 外部JavaScriptファイルの読み込み -->
    <script src="script.js"></script>
</body>
</html>
