<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マインスイーパー×迷路</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f3; padding: 10px; margin: 0; user-select: none; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 5px; }
        .info { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
        
        /* 5x5のマス目をきれいに並べるグリッド設定 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 320px;
            margin: 0 auto 20px auto;
            background: #bbb;
            padding: 6px;
            border-radius: 8px;
        }
        
        /* マスのボタンのデザイン */
        .cell {
            aspect-ratio: 1; /* 正方形にする */
            background: #cbd5e1;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #334155;
            box-shadow: inset 0 -3px 0 #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:active { background: #94a3b8; }
        
        /* 開いたマスのデザイン */
        .cell.open {
            background: #f1f5f9;
            box-shadow: none;
            color: #1e293b;
        }
        .cell.mine { background: #ef4444; color: white; }
        .cell.start { background: #3b82f6; color: white; }
        .cell.goal { background: #10b981; color: white; }

        #result-text { font-size: 1.3rem; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .game-over { color: #ef4444; }
        .game-clear { color: #10b981; }

        button.reset-btn {
            padding: 12px 24px; font-size: 1rem; background: #4f46e5;
            color: white; border: none; border-radius: 6px; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>マインスイーパー × 迷路</h1>
    <div class="info">S(スタート)からG(ゴール)へ、地雷を避けて進め！</div>
    
    <!-- ここにボタンが5x5で並びます -->
    <div id="game-board"></div>
    
    <div id="result-text"></div>
    <button class="reset-btn" onclick="restartGame()">新しくやり直す</button>

    <script>
        const width = 5;
        const height = 5;
        const mineCount = 4;
        let grid = [];      // 中身のデータ（S, P, G, 9, 数字）
        let revealed = [];  // マスが開いているかどうか（true / false）
        let gameOver = false;

        function restartGame() {
            gameOver = false;
            document.getElementById('result-text').className = "";
            document.getElementById('result-text').innerText = "スタートをタップして開始！";
            
            initGrid();
            generatePath();
            placeMines();
            countAdjacentMines();
            createBoardUI();
        }

        function initGrid() {
            grid = [];
            revealed = [];
            for (let x = 0; x < width; x++) {
                grid.push(new Array(height).fill(0));
                revealed.push(new Array(height).fill(false));
            }
        }

        function generatePath() {
            let cx = 0, cy = 0;
            grid[cx][cy] = "S";
            while (cx < width - 1 || cy < height - 1) {
                if (cx < width - 1 && cy < height - 1) {
                    if (Math.random() < 0.5) cx++; else cy++;
                } else if (cx < width - 1) { cx++; } else { cy++; }
                grid[cx][cy] = (cx === width - 1 && cy === height - 1) ? "G" : "P";
            }
        }

        function placeMines() {
            let placed = 0;
            while (placed < mineCount) {
                const rx = Math.floor(Math.random() * width);
                const ry = Math.floor(Math.random() * height);
                if (grid[rx][ry] === 0) {
                    grid[rx][ry] = 9;
                    placed++;
                }
            }
        }

        function countAdjacentMines() {
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    if (grid[x][y] === 9) continue;
                    let count = 0;
                    for (let dx of [-1, 0, 1]) {
                        for (let dy of [-1, 0, 1]) {
                            const nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                if (grid[nx][ny] === 9) count++;
                            }
                        }
                    }
                    if (grid[x][y] === 0 || grid[x][y] === "P") {
                        // 道(P)でも空きマスでも、ヒントとなる地雷数を記憶させる
                        // 元々の属性（S, G, P）を忘れないようにオブジェクト形式で保存
                        const type = grid[x][y];
                        grid[x][y] = { type: type, count: count };
                    }
                }
            }
        }

        // 🛠️ 画面にマス目のボタンを組み立てる処理
        function createBoardUI() {
            const board = document.getElementById('game-board');
            board.innerHTML = ""; // 一度リセット
            
            // 縦横の並び順通りにボタンを作っていく
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const cellBtn = document.createElement('div');
                    cellBtn.className = 'cell';
                    cellBtn.innerText = "❓"; // 最初は全員はてな
                    
                    // スマホでタップされた時のイベント
                    cellBtn.onclick = () => clickCell(x, y, cellBtn);
                    
                    board.appendChild(cellBtn);
                }
            }
        }

        // 🛠️ マスをタップした時の処理
        function clickCell(x, y, element) {
            if (gameOver || revealed[x][y]) return;
            
            revealed[x][y] = true;
            element.classList.add('open');
            
            const data = grid[x][y];
            
            // 1. スタート地点だった場合
            if (data === "S") {
                element.innerText = "S";
                element.classList.add('start');
                document.getElementById('result-text').innerText = "探索中...";
            }
            // 2. ゴール地点だった場合（クリア！）
            else if (data === "G") {
                element.innerText = "G";
                element.classList.add('goal');
                document.getElementById('result-text').innerText = "🎉 迷路クリア！おめでとう！";
                document.getElementById('result-text').className = "game-clear";
                gameOver = true;
                revealAll();
            }
            // 3. 地雷だった場合（ゲームオーバー）
            else if (data === 9) {
                element.innerText = "💥";
                element.classList.add('mine');
                document.getElementById('result-text').innerText = "💀 地雷爆発！ゲームオーバー";
                document.getElementById('result-text').className = "game-over";
                gameOver = true;
                revealAll();
            }
            // 4. 道(P)または普通の安全なマスの By
            else {
                // 周囲の地雷数を表示（0なら空白）
                element.innerText = data.count > 0 ? data.count : "";
                
                // もしそれが「正しい道(P)」の上だったら、ちょっとだけ目印を付ける
                if (data.type === "P") {
                    element.style.color = "#4f46e5"; // 道の上の数字は青紫っぽくする
                }
            }
        }

        // ゲーム終了時に全部のマスをオープンにする
        function revealAll() {
            const cells = document.getElementsByClassName('cell');
            let idx = 0;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const data = grid[x][y];
                    const cell = cells[idx];
                    if (!revealed[x][y]) {
                        cell.classList.add('open');
                        if (data === "S") cell.innerText = "S";
                        else if (data === "G") cell.innerText = "G";
                        else if (data === 9) cell.innerText = "💣";
                        else cell.innerText = data.count > 0 ? data.count : "";
                    }
                    idx++;
                }
            }
        }

        // 初回起動
        restartGame();
    </script>
</body>
</html>
